<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rivals Elite AI - Ultimate Legend Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030409;
    --accent: #00f2ff;
    --neon-green: #00ff96;
    --neon-red: #ff3366;
    --text: #f8fafc;
    --panel: #0f172a;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 550px;
    margin: auto;
    background: var(--panel);
    padding: 25px;
    border-radius: 24px;
    border: 1px solid #1e293b;
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.05);
  }
  .header {
    text-align: center;
    margin-bottom: 18px;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 10px;
  }
  .header h2 {
    margin: 0;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 1px;
    font-weight: 700;
  }

  .mode-toggle {
    display: flex;
    gap: 6px;
    background: #05070f;
    border: 1px solid #1e293b;
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 15px;
  }
  .mode-btn {
    flex: 1;
    padding: 9px 6px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn.active { background: #1e293b; color: var(--text); }
  .mode-btn.active.tactical { color: var(--neon-green); }
  .mode-btn.active.casual { color: var(--accent); }

  .chat-container {
    height: 420px;
    overflow-y: auto;
    background: #05070f;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 15px;
    border: 1px solid #1e293b;
  }
  .msg { margin-bottom: 18px; line-height: 1.65; font-size: 14px; }
  .msg.user { text-align: right; color: #38bdf8; font-weight: 700; }
  .msg.ai { color: #e2e8f0; }
  .msg.ai b { color: var(--accent); }
  .msg.ai code {
    font-family: 'JetBrains Mono', monospace;
    background: #1e293b;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
  }

  .input-area { display: flex; gap: 10px; }
  textarea {
    flex: 1;
    height: 50px;
    background: #1e293b;
    color: white;
    border: 1px solid #334155;
    padding: 12px;
    border-radius: 12px;
    resize: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button {
    padding: 12px 20px;
    background: var(--accent);
    color: #000;
    font-weight: 800;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    transition: all 0.2s;
  }
  button:hover { opacity: 0.9; box-shadow: 0 0 10px var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .scan-btn {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    font-size: 13px;
    background: linear-gradient(135deg, var(--accent), #bd00ff);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .preview-box {
    text-align: center;
    margin: 15px 0;
    display: none;
    background: #000;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #334155;
  }
  .preview-box img { max-width: 100%; max-height: 140px; border-radius: 8px; }
</style>
</head>
<body>

<div class="container">
  <div class="header"><h2>🟢 RIVALS COACH AI</h2></div>

  <div class="mode-toggle">
    <button class="mode-btn tactical active" id="btn-tactical" onclick="setMode('tactical')">🎯 전술 분석 모드</button>
    <button class="mode-btn casual" id="btn-casual" onclick="setMode('casual')">💬 그냥 대화 모드</button>
  </div>

  <input type="file" id="file" accept="image/*" style="display:none" onchange="previewFile()">
  <button class="scan-btn" onclick="document.getElementById('file').click()">📸 플레이 스크린샷 / 영상 프레임 등록</button>

  <div class="preview-box" id="preview-div">
    <p style="font-size:11px; color:var(--accent); margin-top:0;">분석 대기 파일 등록 완료</p>
    <img id="img-view" src="">
  </div>

  <div class="chat-container" id="chat">
    <div class="msg ai">✨ <b>코치:</b> 안녕하세요! Rivals 전술 분석 모드로 시작할게요. 상단에서 '그냥 대화 모드'로 바꾸면 편하게 잡담도 가능해요. 분석할 상황이나 스크린샷을 올려주세요.</div>
  </div>

  <div class="input-area">
    <textarea id="in" placeholder="질문을 쓰거나 이미지를 올린 뒤 전송..." onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendChat()">전송</button>
  </div>
</div>

<script>
/* ============================================================
   이 프론트엔드는 Gemini API를 직접 호출하지 않습니다.
   대신 같은 사이트의 /api/chat 으로 요청을 보내고,
   그 서버리스 함수가 키를 가지고 Gemini를 호출합니다.
   => 브라우저 어디에도 API 키가 존재하지 않습니다.
============================================================ */
const BACKEND_URL = '/api/chat'; // Vercel에 배포하면 자동으로 같은 도메인에서 동작합니다.

let currentMode = 'tactical';
let chatHistory = [];
let uploadedBase64 = null;
let uploadedMimeType = null;

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-tactical').classList.toggle('active', mode === 'tactical');
  document.getElementById('btn-casual').classList.toggle('active', mode === 'casual');

  const chat = document.getElementById('chat');
  const note = document.createElement('div');
  note.className = 'msg ai';
  note.innerHTML = mode === 'tactical'
    ? '✨ <b>코치:</b> 전술 분석 모드로 전환했어요. 상황을 설명하거나 스크린샷을 올려주시면 분석해드릴게요.'
    : '✨ <b>코치:</b> 그냥 대화 모드예요. 편하게 아무거나 물어보세요 😊';
  chat.appendChild(note);
  chat.scrollTop = chat.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function previewFile() {
  const file = document.getElementById('file').files[0];
  if (!file) return;
  uploadedMimeType = file.type;
  const reader = new FileReader();
  reader.onloadend = function () {
    uploadedBase64 = reader.result.split(',')[1];
    document.getElementById('img-view').src = reader.result;
    document.getElementById('preview-div').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatReply(text) {
  let safe = escHtml(text);
  safe = safe.replace(/\n/g, '<br>');
  safe = safe.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
  safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
  return safe;
}

async function sendChat() {
  const input = document.getElementById('in');
  const chat = document.getElementById('chat');
  const sendBtn = document.getElementById('send-btn');
  const txt = input.value.trim();

  if (!txt && !uploadedBase64) {
    alert('내용을 입력해주세요.');
    return;
  }

  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.textContent = txt || '이미지 분석 요청';
  chat.appendChild(userDiv);

  const loading = document.createElement('div');
  loading.className = 'msg ai';
  loading.innerHTML = '✨ <b>코치:</b> 생각 중...';
  chat.appendChild(loading);

  input.value = '';
  sendBtn.disabled = true;
  chat.scrollTop = chat.scrollHeight;

  const isFirstMessage = chatHistory.length === 0;
  const userContentParts = [{ text: txt || '이 이미지를 분석해 주세요.' }];
  if (uploadedBase64) {
    userContentParts.push({ inlineData: { mimeType: uploadedMimeType, data: uploadedBase64 } });
  }

  chatHistory.push({ role: 'user', parts: userContentParts });

  try {
    const res = await fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: chatHistory, mode: currentMode, isFirstMessage })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      loading.innerHTML = `✨ <b>코치:</b> 오류가 발생했습니다: ${escHtml(data.error?.message || '알 수 없는 오류')}`;
      chatHistory.pop();
      sendBtn.disabled = false;
      return;
    }

    const candidate = data.candidates && data.candidates[0];
    const replyText = candidate && candidate.content && candidate.content.parts && candidate.content.parts[0]
      ? candidate.content.parts[0].text
      : null;

    if (!replyText) {
      const reason = candidate?.finishReason ? ` (이유: ${candidate.finishReason})` : '';
      loading.innerHTML = `✨ <b>코치:</b> 응답을 받지 못했어요${escHtml(reason)}. 다시 시도해 주세요.`;
      chatHistory.pop();
      sendBtn.disabled = false;
      return;
    }

    chatHistory.push({ role: 'model', parts: [{ text: replyText }] });
    loading.innerHTML = `✨ <b>코치:</b><br>${formatReply(replyText)}`;

    if (uploadedBase64) {
      const lastUserMsg = chatHistory[chatHistory.length - 2];
      if (lastUserMsg && lastUserMsg.parts) {
        lastUserMsg.parts = lastUserMsg.parts.filter(p => !p.inlineData);
      }
    }
    uploadedBase64 = null;
    uploadedMimeType = null;
    document.getElementById('preview-div').style.display = 'none';

  } catch (e) {
    loading.innerHTML = '✨ <b>코치:</b> 네트워크 연결 오류가 발생했습니다. 다시 시도해 주세요.';
    chatHistory.pop();
  }

  sendBtn.disabled = false;
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
